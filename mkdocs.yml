site_name: Digital Linguistics Playbook
site_url: https://damjan-popic.github.io/digital-linguistics-playbook
repo_url: https://github.com/damjan-popic/digital-linguistics-playbook

theme:
  name: material
  palette:
    scheme: default           # light/dark auto-switch
  features:
    - navigation.sections
    - navigation.instant
    - search.highlight

# nav:
#  - Home: index.md
#  - Playbook: scenarios/
#  - How-tos & Video: howto/
#  - About: about.md

plugins:
  - search
  - tags
  - awesome-pages                   # already bundled with Material
  - mkdocs-video:
      markdown_extensions: true

markdown_extensions:
  - admonition
  - def_list
  - attr_list
  - toc:
      permalink: ⚓︎
